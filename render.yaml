services:
  # Backend API + Socket.IO (sweep worker runs inside this process via setInterval)
  - type: web
    name: deskguard-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: deskguard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: deskguard-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: AWAY_LIMIT_MINUTES
        value: 20
      - key: LIVENESS_INTERVAL_HOURS
        value: 2
      - key: LIVENESS_GRACE_MINUTES
        value: 10
      - key: MAX_AWAY_PERIODS
        value: 3
      - key: SWEEP_INTERVAL_SECONDS
        value: 60

  # Redis — must be in services, NOT in databases
  - type: redis
    name: deskguard-redis
    plan: free
    ipAllowList: []

databases:
  - name: deskguard-db
    plan: free
    databaseName: deskguard
    user: deskguard
